<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 525" role="img" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <title>Vitrail biosurveillance platform diagram</title>
  <desc>Diagram showing how Vitrail intercepts solid sanitary and incontinence waste from facilities before incineration, performs multiplexed nucleic acid analysis, and delivers analytical intelligence to public health, pharma real-world-evidence, and academic research customers.</desc>
  <defs>
    <marker id="arr-d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#04123D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2EB8A6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="22" text-anchor="middle" font-size="10" font-weight="500" letter-spacing="2" fill="#6b7280">EXISTING INFRASTRUCTURE</text>

  <rect x="20" y="50" width="140" height="130" rx="6" fill="#e8f5f3" stroke="#2EB8A6" stroke-width="1"/>
  <text x="90" y="78" text-anchor="middle" font-size="13" font-weight="500" fill="#04123D">Facilities</text>
  <text x="32" y="105" font-size="11" fill="#0a0f1a">• Public sites</text>
  <text x="32" y="125" font-size="11" fill="#0a0f1a">• Care homes</text>
  <text x="32" y="145" font-size="11" fill="#0a0f1a">• Hospitals</text>
  <text x="32" y="165" font-size="11" fill="#0a0f1a">• Universities</text>

  <line x1="163" y1="115" x2="178" y2="115" stroke="#04123D" stroke-width="1.5" marker-end="url(#arr-d)"/>

  <rect x="180" y="50" width="180" height="130" rx="6" fill="#e8f5f3" stroke="#2EB8A6" stroke-width="1"/>
  <text x="270" y="78" text-anchor="middle" font-size="13" font-weight="500" fill="#04123D">Waste collection</text>
  <text x="192" y="105" font-size="11" fill="#0a0f1a">• Sanitary waste bins</text>
  <text x="192" y="125" font-size="11" fill="#0a0f1a">• Fixed collection routes</text>
  <text x="192" y="145" font-size="11" fill="#0a0f1a">• Contractor logistics</text>

  <line x1="363" y1="115" x2="455" y2="115" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-m)"/>
  <text x="409" y="108" text-anchor="middle" font-size="10" font-style="italic" fill="#9ca3af">today</text>

  <rect x="460" y="50" width="160" height="130" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="540" y="115" text-anchor="middle" font-size="14" font-weight="500" fill="#6b7280">Incineration</text>
  <text x="540" y="145" text-anchor="middle" font-size="10" font-style="italic" fill="#9ca3af">— signal discarded —</text>

  <line x1="270" y1="183" x2="270" y2="212" stroke="#2EB8A6" stroke-width="2" marker-end="url(#arr-a)"/>

  <rect x="120" y="215" width="300" height="32" rx="16" fill="#2EB8A6"/>
  <text x="270" y="236" text-anchor="middle" font-size="12" font-weight="500" fill="#ffffff">Vitrail intercepts here — before incineration</text>

  <line x1="270" y1="252" x2="270" y2="275" stroke="#2EB8A6" stroke-width="2" marker-end="url(#arr-a)"/>

  <rect x="20" y="278" width="640" height="70" rx="6" fill="#04123D"/>
  <text x="340" y="305" text-anchor="middle" font-size="14" font-weight="500" fill="#ffffff">Analytical layer</text>
  <text x="340" y="328" text-anchor="middle" font-size="11" fill="#a8b9d6">Multiplexed nucleic acid detection from dried biological material</text>

  <line x1="120" y1="350" x2="120" y2="378" stroke="#04123D" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="340" y1="350" x2="340" y2="378" stroke="#04123D" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="560" y1="350" x2="560" y2="378" stroke="#04123D" stroke-width="1.5" marker-end="url(#arr-d)"/>

  <rect x="20" y="380" width="200" height="125" rx="6" fill="#e8f5f3" stroke="#2EB8A6" stroke-width="1"/>
  <text x="120" y="408" text-anchor="middle" font-size="13" font-weight="500" fill="#04123D">Public health</text>
  <text x="120" y="436" text-anchor="middle" font-size="11" fill="#6b7280">NHS, UKHSA, CDC</text>
  <text x="120" y="456" text-anchor="middle" font-size="11" fill="#6b7280">Local authorities</text>
  <text x="120" y="476" text-anchor="middle" font-size="11" fill="#6b7280">Care homes, ICUs</text>

  <rect x="240" y="380" width="200" height="125" rx="6" fill="#e8f5f3" stroke="#2EB8A6" stroke-width="1"/>
  <text x="340" y="408" text-anchor="middle" font-size="13" font-weight="500" fill="#04123D">Pharma RWE</text>
  <text x="340" y="448" text-anchor="middle" font-size="11" fill="#6b7280">Real-world evidence</text>

  <rect x="460" y="380" width="200" height="125" rx="6" fill="#e8f5f3" stroke="#2EB8A6" stroke-width="1"/>
  <text x="560" y="408" text-anchor="middle" font-size="13" font-weight="500" fill="#04123D">Research</text>
  <text x="560" y="448" text-anchor="middle" font-size="11" fill="#6b7280">Academic partners</text>
</svg>
